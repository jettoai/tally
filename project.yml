name: Tally
options:
  bundleIdPrefix: ai.jetto
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  localizations:
    - en
    - zh-Hant
    - zh-Hans
    - ja
    - ko

packages:
  # In-app auto-updates (appcast + EdDSA-signed downloads). Pinned exactly because the generated
  # xcodeproj (and its Package.resolved) is gitignored - a version range would resolve differently
  # per machine. 2.9.4 also fixes the update window opening behind other apps for menu-bar
  # (dockless) apps (sparkle-project/Sparkle#2889).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4

schemes:
  Tally:
    build:
      targets:
        Tally: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  TallyCLI:
    build:
      targets:
        TallyCLI: all
    run:
      config: Release

targets:
  # `tally` - the account-picking launcher CLI (reads ~/.tally/snapshot.json, execs claude/codex).
  TallyCLI:
    type: tool
    platform: macOS
    sources:
      - TallyCLI
    settings:
      base:
        PRODUCT_NAME: tally
        PRODUCT_BUNDLE_IDENTIFIER: ai.jetto.tally.cli
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 87Z993GX39
        SWIFT_STRICT_CONCURRENCY: complete

  Tally:
    type: application
    platform: macOS
    sources:
      - Tally
    dependencies:
      - package: Sparkle
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Tally/Resources/Tally.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: ai.jetto.tally
        MARKETING_VERSION: "0.13.0"
        CURRENT_PROJECT_VERSION: "159"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 87Z993GX39
        PRODUCT_NAME: Tally
        PRODUCT_MODULE_NAME: Tally
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sparkle wiring. Both values flow into Info.plist via variable substitution; while either
        # is empty (every Debug build, and Release until the EdDSA key is generated at ship time)
        # UpdaterController stays dormant and the Settings row hides - dev builds never poll a feed.
        SPARKLE_FEED_URL: "https://github.com/jettoai/tally/releases/latest/download/appcast.xml"
        SPARKLE_PUBLIC_ED_KEY: ""
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: ai.jetto.tally.dev
          PRODUCT_NAME: "Tally Dev"
          SPARKLE_FEED_URL: ""
    info:
      path: Tally/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: "$(SPARKLE_FEED_URL)"
        SUPublicEDKey: "$(SPARKLE_PUBLIC_ED_KEY)"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 3600
        CFBundleName: Tally
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
